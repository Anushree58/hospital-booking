<!DOCTYPE html>
<html>
<head>
    <title>Search Doctors</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            margin:0;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            text-align:center;
        }

        h1{
            padding-top:40px;
        }

        .search-box{
            margin-top:40px;
        }

        input, select{
            padding:12px;
            width:250px;
            border-radius:25px;
            border:none;
            margin:10px;
            outline:none;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:25px;
            background:#ff6a00;
            color:white;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        button:hover{
            background:#ff3c00;
            transform:scale(1.05);
        }

        .doctor-card{
            background:white;
            color:black;
            width:300px;
            margin:20px auto;
            padding:20px;
            border-radius:15px;
            display:none;
        }

        a{
            color:white;
            text-decoration:none;
            position:absolute;
            left:20px;
            top:20px;
        }
    </style>
</head>

<body>

<a href="index.html">⬅ Back</a>

<div style="display:flex; justify-content:space-between; align-items:center; padding:20px;">
    <h1>Welcome, <span id="userName"></span>!</h1>
    <button onclick="logout()" style="background:gray; border-radius:15px;">Logout</button>
</div>
<h3>Search Available Doctors</h3>



<div class="search-box">
    <input type="text" id="specialization" placeholder="Enter Specialization">
    <select id="location">
        <option value="">Select Location</option>
        <option value="City Hospital">City Hospital</option>
        <option value="Care Medical">Care Medical</option>
    </select>
    <br>
    <button onclick="searchDoctor()">Search</button>
</div>

<div id="doctorResult"></div>

<!-- Booking Modal -->
<div id="bookingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">

    <div style="background:white; color:black; padding:30px; border-radius:15px; width:300px; text-align:center;">

        <h3>Book Appointment</h3>

        <input type="text" id="patientName" placeholder="Enter Your Name"><br>
        <input type="text" id="phone" placeholder="Enter Phone Number"><br>
        <input type="date" id="date"><br><br>

        <button onclick="confirmBooking()">Confirm</button>
        <button onclick="closeModal()" style="background:gray;">Cancel</button>

    </div>
</div>

<div id="successMessage" 
     style="display:none; background:white; color:green; 
     padding:15px; margin:20px auto; width:300px; 
     border-radius:10px; font-weight:bold;">
</div>

<script>
var tokenCounter = 1;


function searchDoctor(){

    var spec = document.getElementById("specialization").value.toLowerCase();
    var loc = document.getElementById("location").value;

    var doctors = [
        {
            name: "Dr. Arjun Kumar",
            specialization: "cardiologist",
            hospital: "City Hospital",
            days: "Mon - Fri",
            time: "10 AM - 2 PM"
        },
        {
            name: "Dr. Meera Nair",
            specialization: "dentist",
            hospital: "Care Medical",
            days: "Tue - Sat",
            time: "11 AM - 4 PM"
        },
        {
            name: "Dr. Rahul Menon",
            specialization: "cardiologist",
            hospital: "Care Medical",
            days: "Mon - Thu",
            time: "9 AM - 1 PM"
        }
    ];

    var resultHTML = "";
    var found = false;

    for(var i=0; i<doctors.length; i++){

        if(spec === doctors[i].specialization && loc === doctors[i].hospital){

            found = true;

            resultHTML += `
            <div class="doctor-card" style="display:block;">
                <h3>${doctors[i].name}</h3>
                <p>${doctors[i].specialization}</p>
                <p>Available: ${doctors[i].days}</p>
                <p>Time: ${doctors[i].time}</p>
                <button onclick="openModal()">Book Token</button>
  
            </div>
                
            `;
        }
    }

    if(found){
        document.getElementById("doctorResult").innerHTML = resultHTML;
    } else {
        document.getElementById("doctorResult").innerHTML = "<p>No doctors found</p>";
        document.getElementById("doctorResult").style.display = "block";
    }
}
function openModal(){
    document.getElementById("bookingModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("bookingModal").style.display = "none";
}

function confirmBooking(){

    var name = document.getElementById("patientName").value;
    var phone = document.getElementById("phone").value;
    var date = document.getElementById("date").value;

    if(name !== "" && phone !== "" && date !== ""){

        document.getElementById("successMessage").innerHTML =
        "✅ Booking Successful! <br> Your Token Number is: " + tokenCounter;

        document.getElementById("successMessage").style.display = "block";

        tokenCounter++;

        closeModal();

        document.getElementById("patientName").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("date").value = "";

    } else {
        alert("Please fill all details");
    }
}

</script>

</body>
</html>
