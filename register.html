<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family:'Poppins',sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            text-align:center;
            padding-top:50px;
        }
        input {
            padding:12px;
            width:250px;
            border-radius:25px;
            border:none;
            margin:10px;
            outline:none;
        }
        button {
            padding:12px 25px;
            border:none;
            border-radius:25px;
            background:#ff6a00;
            color:white;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }
        button:hover {
            background:#ff3c00;
        }
        a {
            color:white;
            text-decoration:none;
        }
    </style>
</head>
<body>

<h1>Register</h1>

<input type="text" id="regName" placeholder="Enter Name"><br>
<input type="email" id="regEmail" placeholder="Enter Email"><br>
<input type="password" id="regPassword" placeholder="Enter Password"><br>

<button onclick="registerUser()">Register</button>

<p>Already have an account? <a href="login.html">Login</a></p>

<script>
function registerUser(){
    var name = document.getElementById("regName").value;
    var email = document.getElementById("regEmail").value;
    var password = document.getElementById("regPassword").value;

    if(name !== "" && email !== "" && password !== ""){
        // Save user in localStorage
        localStorage.setItem("user_"+email, JSON.stringify({name:name, email:email, password:password}));

        alert("Registration Successful 🎉\nPlease login now.");
        window.location.href = "login.html";
    } else {
        alert("Please fill all fields");
    }
}
</script>

</body>
</html>
